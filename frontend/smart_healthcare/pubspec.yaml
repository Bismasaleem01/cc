name: smart_healthcare
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # For secure JWT token storage
  flutter_secure_storage: ^9.0.0

  # HTTP requests
  http: ^1.1.0

  # Optional voice/text features
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  flutter_webrtc: ^1.4.1
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true