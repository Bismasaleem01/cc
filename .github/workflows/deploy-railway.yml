name: Deploy to Railway

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ secrets.RAILWAY_BACKEND_SERVICE }}" --detach

      - name: Deploy frontend
        working-directory: frontend/smart_healthcare
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ secrets.RAILWAY_FRONTEND_SERVICE }}" --detach
