name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/app/requirements.txt

      - name: Install dependencies
        run: pip install -r backend/app/requirements.txt

      - name: Compile Python files
        run: python -m compileall backend/app

      - name: Build backend image
        run: docker build -t smart-healthcare-backend:ci backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: frontend/smart_healthcare
        run: flutter pub get

      - name: Analyze
        working-directory: frontend/smart_healthcare
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build web
        working-directory: frontend/smart_healthcare
        run: flutter build web --no-wasm-dry-run

  compose:
    name: Compose Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config
