name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  BACKEND_IMAGE: smart-healthcare-backend
  FRONTEND_IMAGE: smart-healthcare-frontend

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to Azure Container Registry
        run: az acr login --name "${{ secrets.AZURE_ACR_NAME }}"

      - name: Build and push backend image
        run: |
          docker build \
            -t "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${BACKEND_IMAGE}:${{ github.sha }}" \
            -t "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${BACKEND_IMAGE}:latest" \
            backend
          docker push "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${BACKEND_IMAGE}:${{ github.sha }}"
          docker push "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${BACKEND_IMAGE}:latest"

      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg API_BASE_URL="${{ secrets.AZURE_BACKEND_URL }}" \
            -t "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${FRONTEND_IMAGE}:${{ github.sha }}" \
            -t "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${FRONTEND_IMAGE}:latest" \
            frontend/smart_healthcare
          docker push "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${FRONTEND_IMAGE}:${{ github.sha }}"
          docker push "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${FRONTEND_IMAGE}:latest"

      - name: Update backend Container App
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_BACKEND_APP }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${BACKEND_IMAGE}:${{ github.sha }}" \
            --set-env-vars \
              DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              SECRET_KEY="${{ secrets.SECRET_KEY }}" \
              ALGORITHM="HS256" \
              ACCESS_TOKEN_EXPIRE_MINUTES="60" \
              GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
              SUPABASE_SERVICE_ROLE_KEY="${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              SUPABASE_STORAGE_BUCKET="${{ secrets.SUPABASE_STORAGE_BUCKET }}"

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --name "${{ secrets.AZURE_FRONTEND_APP }}" \
            --resource-group "${{ secrets.AZURE_RESOURCE_GROUP }}" \
            --image "${{ secrets.AZURE_ACR_LOGIN_SERVER }}/${FRONTEND_IMAGE}:${{ github.sha }}"
